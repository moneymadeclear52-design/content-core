# Alembic configuration — migrations for the content_core persistence layer.
# DATABASE_URL env var overrides sqlalchemy.url (see alembic/env.py).
[alembic]
script_location = alembic
sqlalchemy.url = sqlite:///content_core.db

[loggers]
keys = root,sqlalchemy,alembic
[handlers]
keys = console
[formatters]
keys = generic
[logger_root]
level = WARN
handlers = console
[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine
[logger_alembic]
level = INFO
handlers =
qualname = alembic
[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic
[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
